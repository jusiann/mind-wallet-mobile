tags:
  - name: Transactions
    description: Transaction management API

paths:
  /api/transactions/categories:
    get:
      summary: Get all transaction categories (no auth required)
      tags: [Transactions]
      responses:
        200:
          description: List of 10 categories from DB

  /api/transactions:
    post:
      summary: Create a new transaction
      tags: [Transactions]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, type, transaction_timestamp]
              properties:
                amount:
                  type: number
                  description: Positive number with at most 2 decimal places
                type:
                  type: string
                  enum: [EXPENSE, INCOME]
                category_id:
                  type: integer
                  description: ID from GET /api/transactions/categories
                description:
                  type: string
                  maxLength: 500
                transaction_timestamp:
                  type: string
                  format: date-time
      responses:
        201:
          description: Transaction created successfully
        400:
          description: Validation error
        404:
          description: Category not found

    get:
      summary: Get user transactions with optional filters
      tags: [Transactions]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: Max records to return (max 100)
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
        - in: query
          name: type
          schema:
            type: string
            enum: [EXPENSE, INCOME]
        - in: query
          name: category_id
          schema:
            type: integer
          description: Filter by category ID
        - in: query
          name: start_date
          schema:
            type: string
            format: date-time
        - in: query
          name: end_date
          schema:
            type: string
            format: date-time
      responses:
        200:
          description: List of transactions
        400:
          description: Invalid query parameters

  /api/transactions/export:
    get:
      summary: Download all transactions as .xlsx file
      tags: [Transactions]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Excel file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        500:
          description: Export failed

  /api/transactions/{id}:
    get:
      summary: Get a specific transaction by ID
      tags: [Transactions]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Transaction retrieved successfully
        400:
          description: Invalid ID
        403:
          description: Forbidden
        404:
          description: Transaction not found

    put:
      summary: Update a specific transaction
      tags: [Transactions]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                category_id:
                  type: integer
                  nullable: true
                description:
                  type: string
                  maxLength: 500
                transaction_timestamp:
                  type: string
                  format: date-time
      responses:
        200:
          description: Transaction updated successfully
        400:
          description: Invalid input or no fields provided
        403:
          description: Forbidden
        404:
          description: Transaction or category not found

    delete:
      summary: Delete a specific transaction
      tags: [Transactions]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Transaction deleted successfully
        400:
          description: Invalid ID
        403:
          description: Forbidden
        404:
          description: Transaction not found
