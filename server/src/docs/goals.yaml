tags:
  - name: Goals
    description: Savings goals management API

paths:
  /api/goals:
    post:
      summary: Create a new savings goal
      tags: [Goals]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, target_amount, deadline]
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 100
                target_amount:
                  type: number
                  description: Positive number with at most 2 decimal places
                deadline:
                  type: string
                  format: date-time
                  description: Must be a future date
      responses:
        201:
          description: Goal created successfully
        400:
          description: Validation error (missing fields, past deadline, invalid amount)
        401:
          description: Unauthorized

    get:
      summary: Get all goals for the current user
      tags: [Goals]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, COMPLETED, PAUSED]
          description: Filter goals by status
      responses:
        200:
          description: List of goals
        400:
          description: Invalid status filter

  /api/goals/{id}:
    get:
      summary: Get a specific goal by ID
      tags: [Goals]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Goal retrieved successfully
        400:
          description: Invalid ID
        403:
          description: Forbidden
        404:
          description: Goal not found

    put:
      summary: Update a goal (title, amounts, deadline, status)
      tags: [Goals]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 100
                target_amount:
                  type: number
                current_amount:
                  type: number
                  description: Can be updated when routing savings to this goal
                deadline:
                  type: string
                  format: date-time
                status:
                  type: string
                  enum: [ACTIVE, COMPLETED, PAUSED]
      responses:
        200:
          description: Goal updated successfully
        400:
          description: Validation error or no fields provided
        403:
          description: Forbidden
        404:
          description: Goal not found

    delete:
      summary: Delete a goal
      tags: [Goals]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Goal deleted successfully
        400:
          description: Invalid ID
        403:
          description: Forbidden
        404:
          description: Goal not found
