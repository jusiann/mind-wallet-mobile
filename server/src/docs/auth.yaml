tags:
  - name: Auth
    description: Authentication API

paths:
  /api/auth/signup:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullname, email, password]
              properties:
                fullname:
                  type: string
                  minLength: 2
                  maxLength: 50
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        201:
          description: Sign-up successful
        400:
          description: Validation error (missing fields, invalid email/password format)
        409:
          description: Email already exists

  /api/auth/signin:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        200:
          description: Sign-in successful
        400:
          description: Missing or invalid email format
        401:
          description: Invalid email or password

  /api/auth/forgot-password:
    post:
      summary: Request password reset code
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        200:
          description: Reset code sent (same response whether email exists or not)
        400:
          description: Missing or invalid email

  /api/auth/check-reset-code:
    post:
      summary: Verify password reset code
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, reset_code]
              properties:
                email:
                  type: string
                  format: email
                reset_code:
                  type: string
                  description: 8-character uppercase hex code received via email
      responses:
        200:
          description: Code verified — returns a short-lived temporary token
        400:
          description: Invalid or expired reset code

  /api/auth/reset-password:
    post:
      summary: Reset password using temporary token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, temporary_token]
              properties:
                password:
                  type: string
                  minLength: 8
                temporary_token:
                  type: string
      responses:
        200:
          description: Password reset successfully
        400:
          description: Same password as current or validation error
        401:
          description: Invalid or expired temporary token

  /api/auth/refresh-token:
    post:
      summary: Refresh access token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        200:
          description: New access and refresh tokens issued
        401:
          description: Refresh token expired or invalidated
        403:
          description: Invalid refresh token

  /api/auth/me:
    get:
      summary: Get current logged-in user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Current user info with dynamic total balance
        401:
          description: Unauthorized
        404:
          description: User not found

  /api/auth/logout:
    post:
      summary: Logout user (invalidates all tokens)
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Logged out successfully
        401:
          description: Unauthorized

  /api/auth/delete-account:
    delete:
      summary: Permanently delete user account
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        200:
          description: Account deleted successfully
        400:
          description: Missing password
        401:
          description: Incorrect password
        404:
          description: User not found
