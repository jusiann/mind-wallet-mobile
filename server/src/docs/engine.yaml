tags:
  - name: Engine
    description: AI-powered financial habit analysis (LangGraph + Gemini)

paths:
  /api/engine/analyze:
    post:
      summary: Analyze a potential purchase or financial decision
      description: |
        Runs a multi-agent LangGraph pipeline (Classifier → GuardRail → Analysis → Routing).
        Returns classification, a personalized insight, detected savings, and wasteful category warnings.
        Rate limited to 10 requests per 15 minutes.
      tags: [Engine]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input]
              properties:
                input:
                  type: string
                  maxLength: 500
                  description: Natural language description of what the user wants to buy or do
      responses:
        200:
          description: Analysis result from the AI engine
        400:
          description: Missing or empty input, or input exceeds 500 characters
        401:
          description: Unauthorized
        429:
          description: Rate limit exceeded (10 requests per 15 minutes)
        502:
          description: AI service (Gemini) unavailable
